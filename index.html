// ==========================================================
// Utility Functions
// ==========================================================
function generateId() {
  return 'ann_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ==========================================================
// Article Store
// ==========================================================
const ArticleStore = {
  articles: ARTICLES,
  currentId: null,

  init() {
    this.currentId = localStorage.getItem('engreader_current_article') || ARTICLES[0].id;
  },

  getCurrent() {
    return this.articles.find(a => a.id === this.currentId) || this.articles[0];
  },

  setCurrent(id) {
    this.currentId = id;
    localStorage.setItem('engreader_current_article', id);
  },

  getAll() {
    return this.articles;
  }
};

// ==========================================================
// Annotation Store (CRUD + localStorage + indexing)
// ==========================================================
const AnnotationStore = {
  annotations: {},   // { articleId: [annotation, ...] }
  // Index: wordIndex -> annotationId
  index: {},         // { articleId: { wordIndex: annotationId } }

  init() {
    const saved = localStorage.getItem('engreader_annotations');
    if (saved) {
      try { this.annotations = JSON.parse(saved); } catch(e) { this.annotations = {}; }
    }
    this._rebuildIndex();
  },

  _key() {
    return ArticleStore.currentId;
  },

  _rebuildIndex() {
    this.index = {};
    for (const [articleId, anns] of Object.entries(this.annotations)) {
      this.index[articleId] = {};
      for (const ann of anns) {
        for (let i = ann.range.startWordIndex; i <= ann.range.endWordIndex; i++) {
          if (!this.index[articleId][i]) this.index[articleId][i] = [];
          this.index[articleId][i].push(ann.id);
        }
      }
    }
  },

  _save() {
    localStorage.setItem('engreader_annotations', JSON.stringify(this.annotations));
    this._rebuildIndex();
  },

  getForCurrent() {
    return this.annotations[this._key()] || [];
  },

  getById(annId) {
    return this.getForCurrent().find(a => a.id === annId);
  },

  add(type, text, context, range) {
    const ann = {
      id: generateId(),
      type, text, context, range,
      timestamp: Date.now(),
      note: ''
    };
    const key = this._key();
    if (!this.annotations[key]) this.annotations[key] = [];
    this.annotations[key].push(ann);
    this._save();
    return ann;
  },

  remove(annId) {
    const key = this._key();
    if (!this.annotations[key]) return false;
    this.annotations[key] = this.annotations[key].filter(a => a.id !== annId);
    this._save();
    return true;
  },

  getByWordIndex(wordIndex) {
    const idx = this.index[this._key()];
    if (!idx || !idx[wordIndex]) return [];
    return idx[wordIndex].map(id => this.getById(id)).filter(Boolean);
  },

  getStats() {
    const anns = this.getForCurrent();
    return {
      word: anns.filter(a => a.type === 'word').length,
      phrase: anns.filter(a => a.type === 'phrase').length,
      sentence: anns.filter(a => a.type === 'sentence').length
    };
  },

  getLast() {
    const anns = this.getForCurrent();
    return anns.length > 0 ? anns[anns.length - 1] : null;
  },

  getAnnotationsForExport() {
    const anns = this.getForCurrent();
    return {
      words: anns.filter(a => a.type === 'word').map(a => ({
        text: a.text,
        sentence: a.context.sentence,
        paragraphIndex: a.context.paragraphIndex,
        note: a.note
      })),
      phrases: anns.filter(a => a.type === 'phrase').map(a => ({
        text: a.text,
        sentence: a.context.sentence,
        paragraphIndex: a.context.paragraphIndex,
        note: a.note
      })),
      sentences: anns.filter(a => a.type === 'sentence').map(a => ({
        text: a.text,
        paragraphIndex: a.context.paragraphIndex,
        note: a.note
      }))
    };
  },

  importAnnotations(importedAnns, articleId) {
    // Merge: add imported annotations that don't have ID conflicts
    const key = articleId;
    if (!this.annotations[key]) this.annotations[key] = [];
    const existingIds = new Set(this.annotations[key].map(a => a.id));
    const newAnns = importedAnns.filter(a => !existingIds.has(a.id));
    this.annotations[key] = [...this.annotations[key], ...newAnns];
    this._save();
    return newAnns.length;
  }
};

// ==========================================================
// Article Renderer (tokenize + render)
// ==========================================================
const ArticleRenderer = {
  // Parsed token structure: [{ text, wordIndex, sentenceIndex, paragraphIndex }]
  tokens: [],

  tokenize(article) {
    this.tokens = [];
    let wordIdx = 0;
    for (let pi = 0; pi < article.paragraphs.length; pi++) {
      const paragraph = article.paragraphs[pi];
      // Split paragraph into sentences
      const sentences = paragraph.match(/[^.!?]+[.!?]+[\s]*/g) || [paragraph];
      let si = 0;
      let lastEnd = 0;

      // Rebuild sentence tracking within paragraph
      const sentenceRanges = [];
      let pos = 0;
      // Use a simple sentence split
      const parts = paragraph.split(/(?<=[.!?])\s+/);
      let runningPos = 0;
      for (const part of parts) {
        sentenceRanges.push({ start: runningPos, end: runningPos + part.length, text: part.trim() });
        runningPos += part.length + 1; // +1 for the space
      }

      // Tokenize the whole paragraph
      // Split by whitespace but keep punctuation attached
      const words = paragraph.match(/[^\s]+/g) || [];
      let sentenceIndex = 0;
      let charPos = 0;

      for (const word of words) {
        const wordStart = paragraph.indexOf(word, charPos);
        charPos = wordStart + word.length;

        // Determine which sentence this word belongs to
        while (sentenceIndex < sentenceRanges.length - 1 && wordStart >= sentenceRanges[sentenceIndex].end) {
          sentenceIndex++;
        }
        if (sentenceIndex >= sentenceRanges.length) sentenceIndex = sentenceRanges.length - 1;

        this.tokens.push({
          text: word,
          wordIndex: wordIdx,
          sentenceIndex: sentenceIndex,
          paragraphIndex: pi
        });
        wordIdx++;
      }
    }
    return this.tokens;
  },

  getTokenByWordIndex(idx) {
    return this.tokens.find(t => t.wordIndex === idx) || null;
  },

  render(article) {
    this.tokenize(article);
    const container = document.getElementById('article-content');
    container.innerHTML = '';

    let currentParagraph = -1;
    let pEl = null;
    const anns = AnnotationStore.getForCurrent();

    // Build wordIndex -> types map and sentence markers
    const annTypes = {};        // { wordIndex: Set of types }
    const annIdsByWord = {};    // { wordIndex: [annId, ...] }
    const annSentenceStarts = new Set();
    const annSentenceEnds = new Set();
    for (const ann of anns) {
      for (let i = ann.range.startWordIndex; i <= ann.range.endWordIndex; i++) {
        if (!annTypes[i]) annTypes[i] = new Set();
        annTypes[i].add(ann.type);
        if (!annIdsByWord[i]) annIdsByWord[i] = [];
        annIdsByWord[i].push(ann.id);
      }
      if (ann.type === 'sentence') {
        annSentenceStarts.add(ann.range.startWordIndex);
        annSentenceEnds.add(ann.range.endWordIndex);
      }
    }

    for (const token of this.tokens) {
      // New paragraph
      if (token.paragraphIndex !== currentParagraph) {
        currentParagraph = token.paragraphIndex;
        pEl = document.createElement('p');
        pEl.setAttribute('data-paragraph', currentParagraph);
        container.appendChild(pEl);
      }

      const span = document.createElement('span');
      span.className = 'word';
      span.setAttribute('data-word-index', token.wordIndex);
      span.setAttribute('data-sentence-index', token.sentenceIndex);
      span.setAttribute('data-paragraph-index', token.paragraphIndex);
      span.textContent = token.text;

      // Apply annotation styles — multiple types can overlay
      const types = annTypes[token.wordIndex];
      if (types) {
        for (const t of types) {
          span.classList.add('ann-' + t);
        }
        if (types.has('sentence')) {
          if (annSentenceStarts.has(token.wordIndex)) span.classList.add('ann-sentence-first');
          if (annSentenceEnds.has(token.wordIndex)) span.classList.add('ann-sentence-last');
        }
        span.setAttribute('data-annotation-ids', (annIdsByWord[token.wordIndex] || []).join(','));
      }

      pEl.appendChild(span);

      // Add space after each word (except before punctuation)
      if (token.text.match(/^[.,;:!?)\]}'"”’—]/)) {
        // Punctuation — no preceding space needed, already attached
      }
    }

    // Post-process: add proper spacing
    this._fixSpacing(container);
  },

  _fixSpacing(container) {
    // Actually, with inline display, spaces need to be between words.
    // Let's use a different approach: insert space text nodes between word spans.
    const paragraphs = container.querySelectorAll('p');
    for (const p of paragraphs) {
      const spans = Array.from(p.querySelectorAll('.word'));
      // Remove all existing text nodes
      for (const child of Array.from(p.childNodes)) {
        if (child.nodeType === Node.TEXT_NODE) {
          p.removeChild(child);
        }
      }
      // Rebuild with spaces
      p.innerHTML = '';
      for (let i = 0; i < spans.length; i++) {
        p.appendChild(spans[i]);
        if (i < spans.length - 1) {
          const nextText = spans[i + 1].textContent;
          // Add space unless next token is punctuation
          if (nextText && !nextText.match(/^[.,;:!?)\]}'"”’—]/)) {
            p.appendChild(document.createTextNode(' '));
          }
        }
      }
    }
  }
};

// ==========================================================
// Touch / Mouse Handler
// ==========================================================
const TouchHandler = {
  startWordIndex: -1,
  endWordIndex: -1,
  currentWordIndex: -1,
  isDragging: false,
  startX: 0,
  startY: 0,
  startTime: 0,
  active: true,
  selectionActive: false,
  _justSelected: false,      // Flag to prevent click after selection
  _lastTapWordIndex: -1,     // For double-tap detection
  _lastTapTime: 0,           // For double-tap detection
  _singleTapTimer: null,     // Delayed tap timer
  _isTouchDevice: false,     // Detected on first touch

  init() {
    const content = document.getElementById('article-content');
    content.addEventListener('touchstart', this._onTouchStart.bind(this), { passive: false });
    content.addEventListener('touchmove', this._onTouchMove.bind(this), { passive: false });
    content.addEventListener('touchend', this._onTouchEnd.bind(this));
    content.addEventListener('touchcancel', this._onTouchEnd.bind(this));
    // Mouse events for desktop
    content.addEventListener('mousedown', this._onMouseDown.bind(this));
    content.addEventListener('mousemove', this._onMouseMove.bind(this));
    content.addEventListener('mouseup', this._onMouseUp.bind(this));
    // Click for desktop double-click detection and annotation detail
    content.addEventListener('click', this._onClick.bind(this));
  },

  setActive(val) { this.active = val; },

  _getWordAtPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    if (el && el.classList.contains('word')) {
      return parseInt(el.getAttribute('data-word-index'));
    }
    return -1;
  },

  _clearSelection() {
    const prev = document.querySelectorAll('#article-content .word.selected, #article-content .word.selection-start, #article-content .word.selection-end');
    prev.forEach(el => {
      el.classList.remove('selected', 'selection-start', 'selection-end');
    });
    this.selectionActive = false;
    this.startWordIndex = -1;
    this.endWordIndex = -1;
  },

  _highlightRange(start, end) {
    const [s, e] = start <= end ? [start, end] : [end, start];
    const container = document.getElementById('article-content');
    const allWords = container.querySelectorAll('.word');
    allWords.forEach(el => {
      const idx = parseInt(el.getAttribute('data-word-index'));
      el.classList.remove('selected', 'selection-start', 'selection-end');
      if (idx >= s && idx <= e) {
        el.classList.add('selected');
      }
    });
    // Mark start and end
    const startEl = container.querySelector(`.word[data-word-index="${s}"]`);
    const endEl = container.querySelector(`.word[data-word-index="${e}"]`);
    if (startEl) { startEl.classList.remove('selected'); startEl.classList.add('selection-start'); }
    if (endEl && endEl !== startEl) { endEl.classList.remove('selected'); endEl.classList.add('selection-end'); }
    this.selectionActive = true;
    this.startWordIndex = s;
    this.endWordIndex = e;
  },

  // Shared: annotate a range and clean up
  _annotateAndCleanup(type, rangeStart, rangeEnd) {
    const [s, e] = rangeStart <= rangeEnd ? [rangeStart, rangeEnd] : [rangeEnd, rangeStart];

    // Check for duplicate — reject only if same type already covers this word
    for (let i = s; i <= e; i++) {
      const existing = AnnotationStore.getByWordIndex(i);
      if (existing.some(a => a.type === type)) {
        showToast('已有同类型标注');
        this._clearSelection();
        return;
      }
    }

    const range = { start: s, end: e };
    const ann = AnnotationStore.add(
      type,
      SelectionManager.getSelectedText(range),
      SelectionManager.getSelectedContext(range),
      { startWordIndex: s, endWordIndex: e }
    );
    this._clearSelection();
    UIController.refreshAll();
    const typeNames = { word: '生词', phrase: '短语', sentence: '难句' };
    showToast(`已标记${typeNames[type]}：${ann.text.slice(0, 20)}${ann.text.length > 20 ? '...' : ''}`);
  },

  // ===== Touch Events =====

  _onTouchStart(e) {
    if (!this.active) return;
    if (e.touches.length !== 1) return;
    this._isTouchDevice = true;
    const touch = e.touches[0];
    this.startX = touch.clientX;
    this.startY = touch.clientY;
    this.startTime = Date.now();
    this.isDragging = false;
    this.startWordIndex = this._getWordAtPoint(touch.clientX, touch.clientY);
    this.currentWordIndex = this.startWordIndex;

    if (this.startWordIndex >= 0) {
      this._highlightRange(this.startWordIndex, this.startWordIndex);
    }
  },

  _onTouchMove(e) {
    if (!this.active || this.startWordIndex < 0) return;
    if (e.touches.length !== 1) return;
    const touch = e.touches[0];
    const dx = Math.abs(touch.clientX - this.startX);
    const dy = Math.abs(touch.clientY - this.startY);
    const totalMove = Math.sqrt(dx * dx + dy * dy);

    if (totalMove > 10) {
      if (dy > dx * 1.8) {
        // Primarily vertical swipe → user is scrolling, cancel selection
        this._clearSelection();
        this.isDragging = false;
        return;
      }
      // Enter selection mode
      this.isDragging = true;
      e.preventDefault();
    }

    if (this.isDragging) {
      const wordIdx = this._getWordAtPoint(touch.clientX, touch.clientY);
      if (wordIdx >= 0 && wordIdx !== this.currentWordIndex) {
        this.currentWordIndex = wordIdx;
        this._highlightRange(this.startWordIndex, wordIdx);
      }
    }
  },

  _onTouchEnd(e) {
    if (!this.active) return;

    if (this.isDragging && this.selectionActive) {
      // Drag → annotate as PHRASE
      const endIdx = this.currentWordIndex >= 0 ? this.currentWordIndex : this.startWordIndex;
      this._annotateAndCleanup('phrase', this.startWordIndex, endIdx);
      this._justSelected = true;
      setTimeout(() => { this._justSelected = false; }, 500);
      return;
    }

    if (!this.isDragging && this.selectionActive && this.startWordIndex >= 0) {
      // Tap → check for double-tap
      const wordIdx = this.startWordIndex;
      const now = Date.now();

      // Block click event from showing annotation panel
      this._justSelected = true;

      if (this._lastTapWordIndex === wordIdx && (now - this._lastTapTime) < 420) {
        // Double tap detected → annotate as SENTENCE (whole sentence)
        clearTimeout(this._singleTapTimer);
        this._singleTapTimer = null;
        this._lastTapWordIndex = -1;

        const sentenceRange = SelectionManager.getSentenceRange(wordIdx);
        if (sentenceRange) {
          this._highlightRange(sentenceRange.start, sentenceRange.end);
          this._annotateAndCleanup('sentence', sentenceRange.start, sentenceRange.end);
        }
        setTimeout(() => { this._justSelected = false; }, 500);
      } else {
        // First tap → delay to check if double-tap follows
        this._lastTapWordIndex = wordIdx;
        this._lastTapTime = now;
        clearTimeout(this._singleTapTimer);

        this._singleTapTimer = setTimeout(() => {
          // No second tap → annotate as WORD
          this._annotateAndCleanup('word', wordIdx, wordIdx);
          this._lastTapWordIndex = -1;
          this._singleTapTimer = null;
          setTimeout(() => { this._justSelected = false; }, 200);
        }, 420);
      }
    }
  },

  // ===== Mouse Events =====

  _onMouseDown(e) {
    if (!this.active) return;
    // Skip mouse handling on touch devices
    if (this._isTouchDevice) return;
    this.startX = e.clientX;
    this.startY = e.clientY;
    this.startTime = Date.now();
    this.isDragging = false;
    this.startWordIndex = this._getWordAtPoint(e.clientX, e.clientY);
    this.currentWordIndex = this.startWordIndex;
    if (this.startWordIndex >= 0) {
      this._highlightRange(this.startWordIndex, this.startWordIndex);
    }
  },

  _onMouseMove(e) {
    if (!this.active || this.startWordIndex < 0) return;
    if (e.buttons !== 1) return;
    const dx = Math.abs(e.clientX - this.startX);
    const dy = Math.abs(e.clientY - this.startY);
    if (dx > 5 || dy > 5) this.isDragging = true;
    if (this.isDragging) {
      const wordIdx = this._getWordAtPoint(e.clientX, e.clientY);
      if (wordIdx >= 0 && wordIdx !== this.currentWordIndex) {
        this.currentWordIndex = wordIdx;
        this._highlightRange(this.startWordIndex, wordIdx);
      }
    }
  },

  _onMouseUp(e) {
    if (!this.active || this._isTouchDevice) return;

    if (this.isDragging && this.selectionActive) {
      // Drag → annotate as PHRASE
      const endIdx = this.currentWordIndex >= 0 ? this.currentWordIndex : this.startWordIndex;
      this._annotateAndCleanup('phrase', this.startWordIndex, endIdx);
      this._justSelected = true;
      setTimeout(() => { this._justSelected = false; }, 500);
    }
    // For click (non-drag), defer to _onClick which has click count info
  },

  _onClick(e) {
    // On touch devices, _justSelected blocks annotation detail after selection
    if (this._justSelected) return;

    // Desktop: single click (detail=1) → word, double click (detail=2) → sentence
    if (!this._isTouchDevice && !this.isDragging) {
      const wordEl = e.target.closest('.word');
      if (!wordEl) return;
      const wordIdx = parseInt(wordEl.getAttribute('data-word-index'));
      if (isNaN(wordIdx)) return;

      if (e.detail === 2) {
        // Double click → annotate as SENTENCE (whole sentence)
        e.preventDefault();
        const sentenceRange = SelectionManager.getSentenceRange(wordIdx);
        if (sentenceRange) {
          this._highlightRange(sentenceRange.start, sentenceRange.end);
          this._annotateAndCleanup('sentence', sentenceRange.start, sentenceRange.end);
        }
        this._justSelected = true;
        setTimeout(() => { this._justSelected = false; }, 500);
        return;
      }

      if (e.detail === 1) {
        // Single click → check if clicking an annotation to view detail
        const annIds = wordEl.getAttribute('data-annotation-ids');
        if (annIds) {
          e.preventDefault();
          e.stopPropagation();
          UIController.showAnnotationPanel(annIds.split(',')[0]);
          return;
        }
        // Otherwise → annotate as WORD
        e.preventDefault();
        this._annotateAndCleanup('word', wordIdx, wordIdx);
        this._justSelected = true;
        setTimeout(() => { this._justSelected = false; }, 500);
        return;
      }
      return;
    }

    // Touch device: check if clicking an annotation to view detail
    const wordEl = e.target.closest('.word');
    if (!wordEl) return;
    const annIds = wordEl.getAttribute('data-annotation-ids');
    if (annIds) {
      e.preventDefault();
      e.stopPropagation();
      UIController.showAnnotationPanel(annIds.split(',')[0]);
    }
  }
};

// ==========================================================
// Selection Manager
// ==========================================================
const SelectionManager = {
  clearSelection() {
    TouchHandler._clearSelection();
  },

  getSelectedRange() {
    return {
      start: Math.min(TouchHandler.startWordIndex, TouchHandler.endWordIndex),
      end: Math.max(TouchHandler.startWordIndex, TouchHandler.endWordIndex)
    };
  },

  getSelectedText(range) {
    const tokens = ArticleRenderer.tokens;
    const words = [];
    for (let i = range.start; i <= range.end; i++) {
      const t = tokens.find(tk => tk.wordIndex === i);
      if (t) words.push(t.text);
    }
    return words.join(' ');
  },

  getSelectedContext(range) {
    const tokens = ArticleRenderer.tokens;
    const startToken = tokens.find(t => t.wordIndex === range.start);
    if (!startToken) return { sentence: '', sentenceIndex: 0, paragraphIndex: 0 };
    // Get the full sentence
    const sentenceTokens = tokens.filter(t =>
      t.paragraphIndex === startToken.paragraphIndex &&
      t.sentenceIndex === startToken.sentenceIndex
    );
    const sentence = sentenceTokens.map(t => t.text).join(' ');
    return {
      sentence,
      sentenceIndex: startToken.sentenceIndex,
      paragraphIndex: startToken.paragraphIndex
    };
  },

  // Return the word index range for the entire sentence containing wordIndex
  getSentenceRange(wordIndex) {
    const tokens = ArticleRenderer.tokens;
    const targetToken = tokens.find(t => t.wordIndex === wordIndex);
    if (!targetToken) return null;
    const sentenceTokens = tokens.filter(t =>
      t.paragraphIndex === targetToken.paragraphIndex &&
      t.sentenceIndex === targetToken.sentenceIndex
    );
    if (sentenceTokens.length === 0) return null;
    const indices = sentenceTokens.map(t => t.wordIndex);
    return { start: Math.min(...indices), end: Math.max(...indices) };
  }
};

// ==========================================================
// UI Controller
// ==========================================================
const UIController = {
  init() {
    this._bindEvents();
    this._updateStats();
    this._updateUndoButton();
  },

  _bindEvents() {
    // Selection panel
    document.getElementById('selection-overlay').addEventListener('click', () => this.hideSelectionPanel());
    document.getElementById('btn-selection-cancel').addEventListener('click', () => this.hideSelectionPanel());
    document.querySelectorAll('#selection-panel .type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.getAttribute('data-type');
        this._annotate(type);
      });
    });

    // Annotation detail panel
    document.getElementById('ann-overlay').addEventListener('click', () => this.hideAnnotationPanel());
    document.getElementById('btn-ann-close').addEventListener('click', () => this.hideAnnotationPanel());
    document.getElementById('btn-ann-delete').addEventListener('click', () => this._deleteAnnotation());

    // Export modal
    document.getElementById('btn-export').addEventListener('click', () => this.showExportModal());
    document.getElementById('export-modal-bg').addEventListener('click', () => this.hideExportModal());
    document.getElementById('btn-modal-close').addEventListener('click', () => this.hideExportModal());
    document.querySelectorAll('#export-modal .export-option').forEach(opt => {
      opt.addEventListener('click', () => {
        const format = opt.getAttribute('data-format');
        ExportManager.exportAnnotations(format);
        this.hideExportModal();
      });
    });

    // Random article
    document.getElementById('btn-random').addEventListener('click', () => this._randomArticle());

    // Import
    document.getElementById('btn-import').addEventListener('click', () => {
      document.getElementById('import-input').click();
    });
    document.getElementById('import-input').addEventListener('change', (e) => {
      if (e.target.files[0]) {
        ExportManager.importAnnotations(e.target.files[0]);
        e.target.value = '';
      }
    });

    // Undo
    document.getElementById('btn-undo').addEventListener('click', () => this._undo());

    // Two-level article selector: year → article
    const yearSelect = document.getElementById('year-select');
    const articleSelect = document.getElementById('article-select');
    yearSelect.addEventListener('change', () => this._onYearChange(yearSelect.value));
    articleSelect.addEventListener('change', () => this._switchArticle(articleSelect.value));

    // Status bar stat clicks — scroll to first annotation of that type
    document.querySelectorAll('#status-bar .stat').forEach(stat => {
      stat.addEventListener('click', () => {
        const type = stat.getAttribute('data-type');
        const first = document.querySelector(`#article-content .word.ann-${type}`);
        if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    });

    // List panel
    document.getElementById('btn-list').addEventListener('click', () => this.showListPanel());
    document.getElementById('list-overlay').addEventListener('click', () => this.hideListPanel());
    document.getElementById('btn-list-close').addEventListener('click', () => this.hideListPanel());
  },

  _populateArticleSelect() {
    const yearSelect = document.getElementById('year-select');
    const articleSelect = document.getElementById('article-select');
    const currentId = ArticleStore.currentId;
    const currentArticle = ArticleStore.articles.find(a => a.id === currentId);
    const currentYear = currentArticle ? currentArticle.year : 2005;

    // Populate years
    yearSelect.innerHTML = '';
    const years = [...new Set(ArticleStore.getAll().map(a => a.year))].sort();
    years.forEach(y => {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = `${y} 年`;
      if (y === currentYear) opt.selected = true;
      yearSelect.appendChild(opt);
    });

    // Populate articles for current year
    this._populateArticleOptions(currentYear, currentId);

    // Ensure currentId matches (in case it was from a different year)
    ArticleStore.currentId = currentId;
  },

  _populateArticleOptions(year, selectedId) {
    const select = document.getElementById('article-select');
    select.innerHTML = '';
    ArticleStore.getAll().filter(a => a.year === parseInt(year)).forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = a.title;
      if (a.id === selectedId) opt.selected = true;
      select.appendChild(opt);
    });
  },

  _randomArticle() {
    const all = ArticleStore.getAll();
    const pick = all[Math.floor(Math.random() * all.length)];
    document.getElementById('year-select').value = pick.year;
    this._populateArticleOptions(pick.year, pick.id);
    this._switchArticle(pick.id);
  },

  _onYearChange(year) {
    const articles = ArticleStore.getAll().filter(a => a.year === parseInt(year));
    if (articles.length === 0) return;
    const firstId = articles[0].id;
    this._populateArticleOptions(year, firstId);
    this._switchArticle(firstId);
  },

  _switchArticle(id) {
    ArticleStore.setCurrent(id);
    AnnotationStore._rebuildIndex();
    this.refreshAll();
  },

  _annotate(type) {
    const range = SelectionManager.getSelectedRange();
    const text = SelectionManager.getSelectedText(range);
    const context = SelectionManager.getSelectedContext(range);

    if (!text.trim()) return;

    const ann = AnnotationStore.add(type, text, context, range);
    this.hideSelectionPanel();
    SelectionManager.clearSelection();
    this.refreshAll();
    showToast(type === 'word' ? `已标记生词：${text}` : type === 'phrase' ? `已标记短语：${text}` : `已标记难句`);
  },

  _deleteAnnotation() {
    const annId = this._currentAnnId;
    if (!annId) return;
    const ann = AnnotationStore.getById(annId);
    if (!ann) return;
    AnnotationStore.remove(annId);
    this.hideAnnotationPanel();
    SelectionManager.clearSelection();
    this.refreshAll();
    showToast('标注已删除');
  },

  _undo() {
    const last = AnnotationStore.getLast();
    if (!last) return;
    AnnotationStore.remove(last.id);
    this.refreshAll();
    showToast('已撤销最近标注');
  },

  // ===== List Panel =====

  showListPanel() {
    const anns = AnnotationStore.getForCurrent();
    const container = document.getElementById('list-content');
    const title = document.getElementById('list-title');

    if (anns.length === 0) {
      title.textContent = '标注列表';
      container.innerHTML = '<div class="list-empty">暂无标注</div>';
    } else {
      title.textContent = `标注列表（共 ${anns.length} 条）`;
      const groups = [
        { type: 'word', icon: '📕', label: '生词' },
        { type: 'phrase', icon: '📘', label: '短语' },
        { type: 'sentence', icon: '📗', label: '难句' }
      ];

      let html = '';
      for (const g of groups) {
        const items = anns.filter(a => a.type === g.type);
        if (items.length === 0) continue;
        html += `<div class="list-group">`;
        html += `<div class="list-group-header">${g.icon} ${g.label}（${items.length}）</div>`;
        for (const ann of items) {
          const ctxSnippet = (ann.context.sentence || ann.text).slice(0, 40);
          html += `
            <div class="list-item" data-ann-id="${ann.id}">
              <span class="li-icon">${g.icon}</span>
              <div class="li-info">
                <span class="li-text">${escapeHtml(ann.text)}</span>
                <span class="li-context">${escapeHtml(ctxSnippet)}${ctxSnippet.length >= 40 ? '...' : ''}</span>
              </div>
              <button class="li-delete" data-action="delete">删除</button>
            </div>`;
        }
        html += `</div>`;
      }
      container.innerHTML = html;

      // Delegate click: item click → locate, delete button → delete
      container.onclick = (e) => {
        const deleteBtn = e.target.closest('.li-delete');
        const item = e.target.closest('.list-item');
        if (!item) return;
        const annId = item.getAttribute('data-ann-id');
        if (deleteBtn) {
          e.stopPropagation();
          this._deleteFromList(annId);
        } else {
          this._locateAnnotation(annId);
        }
      };
    }

    document.getElementById('list-overlay').classList.add('show');
    document.getElementById('list-panel').classList.add('show');
    TouchHandler.setActive(false);
  },

  hideListPanel() {
    document.getElementById('list-overlay').classList.remove('show');
    document.getElementById('list-panel').classList.remove('show');
    TouchHandler.setActive(true);
  },

  _locateAnnotation(annId) {
    this.hideListPanel();
    // Find the DOM element for this annotation
    const el = document.querySelector(`#article-content .word[data-annotation-ids*="${annId}"]`);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Blink highlight
    el.classList.add('blink-locate');
    setTimeout(() => el.classList.remove('blink-locate'), 1600);
  },

  _deleteFromList(annId) {
    AnnotationStore.remove(annId);
    this.refreshAll();
    // Re-render the list panel
    this.showListPanel();
    showToast('标注已删除');
  },

  _currentSelectionRange: null,
  _currentAnnId: null,

  showSelectionPanel(startWordIndex, endWordIndex) {
    const [s, e] = startWordIndex <= endWordIndex ? [startWordIndex, endWordIndex] : [endWordIndex, startWordIndex];
    const range = { start: s, end: e };
    this._currentSelectionRange = range;
    const text = SelectionManager.getSelectedText(range);

    document.getElementById('selection-text').textContent = text;
    document.getElementById('selection-overlay').classList.add('show');
    document.getElementById('selection-panel').classList.add('show');
    TouchHandler.setActive(false);
  },

  hideSelectionPanel() {
    document.getElementById('selection-overlay').classList.remove('show');
    document.getElementById('selection-panel').classList.remove('show');
    this._currentSelectionRange = null;
    SelectionManager.clearSelection();
    TouchHandler.setActive(true);
  },

  showAnnotationPanel(annId) {
    const ann = AnnotationStore.getById(annId);
    if (!ann) return;
    this._currentAnnId = annId;

    const tag = document.getElementById('ann-tag');
    tag.textContent = ann.type === 'word' ? '生词' : ann.type === 'phrase' ? '短语' : '难句';
    tag.className = 'tag ' + ann.type;

    document.getElementById('ann-text').textContent = ann.text;
    document.getElementById('ann-context').textContent = '原文：' + ann.context.sentence;

    document.getElementById('ann-overlay').classList.add('show');
    document.getElementById('ann-panel').classList.add('show');
    TouchHandler.setActive(false);
  },

  hideAnnotationPanel() {
    document.getElementById('ann-overlay').classList.remove('show');
    document.getElementById('ann-panel').classList.remove('show');
    this._currentAnnId = null;
    TouchHandler.setActive(true);
  },

  showExportModal() {
    document.getElementById('export-modal').classList.add('show');
  },

  hideExportModal() {
    document.getElementById('export-modal').classList.remove('show');
  },

  _updateStats() {
    const stats = AnnotationStore.getStats();
    document.getElementById('count-word').textContent = stats.word;
    document.getElementById('count-phrase').textContent = stats.phrase;
    document.getElementById('count-sentence').textContent = stats.sentence;
  },

  _updateUndoButton() {
    const btn = document.getElementById('btn-undo');
    const last = AnnotationStore.getLast();
    btn.disabled = !last;
    if (last) {
      btn.textContent = `↩ 撤销"${last.text.slice(0, 10)}${last.text.length > 10 ? '...' : ''}"`;
    } else {
      btn.textContent = '↩ 撤销';
    }
  },

  refreshAll() {
    const article = ArticleStore.getCurrent();
    document.getElementById('article-title').textContent = article.title;
    document.getElementById('article-meta').textContent = `${article.year} 年 · 来源：${article.source}`;
    const main = document.getElementById('main');
    const scrollTop = main.scrollTop;
    ArticleRenderer.render(article);
    main.scrollTop = scrollTop;
    this._updateStats();
    this._updateUndoButton();
  }
};

// ==========================================================
// Export / Import Manager
// ==========================================================
const ExportManager = {
  exportAnnotations(format) {
    const article = ArticleStore.getCurrent();
    const annData = AnnotationStore.getAnnotationsForExport();
    const total = annData.words.length + annData.phrases.length + annData.sentences.length;

    if (total === 0) {
      showToast('当前文章没有标注数据');
      return;
    }

    let content, filename, mimeType;

    if (format === 'json') {
      const exportObj = {
        version: '1.0',
        exportDate: new Date().toISOString(),
        article: {
          id: article.id,
          year: article.year,
          title: article.title,
          source: article.source,
          paragraphs: article.paragraphs
        },
        annotations: annData
      };
      content = JSON.stringify(exportObj, null, 2);
      filename = `engreader-${article.id}.json`;
      mimeType = 'application/json';
    } else {
      // Markdown
      let md = `# 考研英语阅读标注 — ${article.year} ${article.title}\n\n`;
      md += `## 文章信息\n`;
      md += `- 年份：${article.year}\n`;
      md += `- 来源：${article.source}\n\n`;

      if (annData.words.length > 0) {
        md += `## 📕 生词 (${annData.words.length})\n\n`;
        annData.words.forEach(w => {
          md += `- **${w.text}**\n`;
          md += `  > 原文：${w.sentence}\n\n`;
        });
      }
      if (annData.phrases.length > 0) {
        md += `## 📘 短语 (${annData.phrases.length})\n\n`;
        annData.phrases.forEach(p => {
          md += `- **${p.text}**\n`;
          md += `  > 原文：${p.sentence}\n\n`;
        });
      }
      if (annData.sentences.length > 0) {
        md += `## 📗 难句 (${annData.sentences.length})\n\n`;
        annData.sentences.forEach(s => {
          md += `- ${s.text}\n\n`;
        });
      }
      content = md;
      filename = `engreader-${article.id}.md`;
      mimeType = 'text/markdown';
    }

    const blob = new Blob([content], { type: mimeType + ';charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast(`已导出：${filename}`);
  },

  importAnnotations(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.article || !data.annotations) {
          showToast('文件格式不正确');
          return;
        }
        // Rebuild annotations with proper structure
        const article = ArticleStore.getCurrent();
        const importedAnns = [];

        // Process words
        if (data.annotations.words) {
          data.annotations.words.forEach(w => {
            importedAnns.push({
              id: generateId(),
              type: 'word',
              text: w.text,
              context: {
                sentence: w.sentence,
                sentenceIndex: 0,
                paragraphIndex: w.paragraphIndex || 0
              },
              range: { startWordIndex: -1, endWordIndex: -1 }, // Can't restore range from export
              timestamp: Date.now(),
              note: w.note || ''
            });
          });
        }
        if (data.annotations.phrases) {
          data.annotations.phrases.forEach(p => {
            importedAnns.push({
              id: generateId(),
              type: 'phrase',
              text: p.text,
              context: {
                sentence: p.sentence,
                sentenceIndex: 0,
                paragraphIndex: p.paragraphIndex || 0
              },
              range: { startWordIndex: -1, endWordIndex: -1 },
              timestamp: Date.now(),
              note: p.note || ''
            });
          });
        }
        if (data.annotations.sentences) {
          data.annotations.sentences.forEach(s => {
            importedAnns.push({
              id: generateId(),
              type: 'sentence',
              text: s.text,
              context: {
                sentence: s.text,
                sentenceIndex: 0,
                paragraphIndex: s.paragraphIndex || 0
              },
              range: { startWordIndex: -1, endWordIndex: -1 },
              timestamp: Date.now(),
              note: s.note || ''
            });
          });
        }

        const count = AnnotationStore.importAnnotations(importedAnns, ArticleStore.currentId);
        UIController.refreshAll();
        showToast(`成功导入 ${count} 条标注`);
      } catch (err) {
        showToast('文件解析失败：' + err.message);
      }
    };
    reader.readAsText(file);
  }
};

// ==========================================================
// App Initialization
// ==========================================================
function init() {
  ArticleStore.init();
  AnnotationStore.init();
  TouchHandler.init();
  UIController.init();
  UIController._populateArticleSelect();
  UIController.refreshAll();

  // Prevent default double-tap zoom on the article area
  document.getElementById('article-content').addEventListener('dblclick', (e) => {
    e.preventDefault();
  });
}

// Start the app
document.addEventListener('DOMContentLoaded', init);
